services:
  - type: web
    name: double-life-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DB_PATH
        value: /var/data/double_life.sqlite3
      - key: PYTHON_VERSION
        value: 3.12.8
    disk:
      name: double-life-data
      mountPath: /var/data
      sizeGB: 1
